<main class="main">
  <div class="content">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 800 150"
      width="800"
      height="150"
      role="img"
    >
      <g app-disk [radius]="20" [post]="0" [level]="4" [color]="'#E7180B'"></g>
      <g app-disk [radius]="30" [post]="0" [level]="3" [color]="'#E1712B'"></g>
      <g app-disk [radius]="40" [post]="0" [level]="2" [color]="'#18786F'"></g>
      <g app-disk [radius]="50" [post]="0" [level]="1" [color]="'#A813B7'"></g>
      <g app-disk [radius]="60" [post]="0" [level]="0" [color]="'#3b82f6'"></g>
    </svg>
    <div>
      <button (click)="reverse()">Reverse</button>
      <button (click)="prior()">Prior</button>
      <button (click)="reset()">Reset</button>
      <button (click)="next()">Next</button>
      <button (click)="advance()">Advance</button>
    </div>
  </div>
</main>
